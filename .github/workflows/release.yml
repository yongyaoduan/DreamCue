name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.2.3
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.version }}

jobs:
  android-release:
    name: Android release APK
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_APPLICATION_ID: ${{ secrets.FIREBASE_APPLICATION_ID }}
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      ANDROID_NDK_VERSION: "27.1.12297006"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Configure Android release secrets
        run: |
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            FIREBASE_PROJECT_ID
            FIREBASE_APPLICATION_ID
            FIREBASE_API_KEY
            FIREBASE_DATABASE_URL
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required for the Android release build." >&2
              exit 1
            fi
          done

          mkdir -p android/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/release.jks
          {
            echo "storeFile=keystore/release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/keystore/release.properties

          {
            echo "firebaseProjectId=$FIREBASE_PROJECT_ID"
            echo "firebaseApplicationId=$FIREBASE_APPLICATION_ID"
            echo "firebaseApiKey=$FIREBASE_API_KEY"
            echo "firebaseDatabaseUrl=$FIREBASE_DATABASE_URL"
          } > android/firebase.local.properties

      - name: Test Rust core
        run: cargo test --workspace

      - name: Build Android native libraries
        run: ./scripts/build-rust-android.sh

      - name: Test and build Android APK
        run: gradle -p android :app:testDebugUnitTest :app:compileDebugAndroidTestKotlin :app:assembleRelease

      - name: Prepare Android artifact
        run: |
          mkdir -p "$RUNNER_TEMP/release-assets"
          cp android/app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/release-assets/DreamCue-android-$RELEASE_VERSION.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamcue-android-release
          path: ${{ runner.temp }}/release-assets/DreamCue-android-${{ env.RELEASE_VERSION }}.apk
          if-no-files-found: error

  macos-release:
    name: macOS release package
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run macOS UI tests
        run: xcodebuild -project macos/DreamCueMac.xcodeproj -scheme DreamCueMac -destination 'platform=macOS' test

      - name: Import Developer ID certificate
        if: env.MACOS_CERTIFICATE_P12_BASE64 != ''
        env:
          BUILD_KEYCHAIN_PASSWORD: ${{ runner.temp }}-keychain-password
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/dreamcue-release.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$BUILD_KEYCHAIN_PASSWORD" "$keychain_path"

      - name: Build macOS release
        id: build_macos
        run: |
          if [[ -n "${MACOS_CERTIFICATE_P12_BASE64:-}" ]]; then
            export DREAMCUE_MACOS_CODE_SIGN_IDENTITY="${MACOS_CODE_SIGN_IDENTITY:-Developer ID Application}"
            if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
              export DREAMCUE_NOTARIZE=1
            fi
          fi
          export DREAMCUE_RELEASE_VERSION="$RELEASE_VERSION"
          zip_path="$(./scripts/build-macos-release.sh)"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamcue-macos-release
          path: ${{ steps.build_macos.outputs.zip_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - android-release
      - macos-release
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: DreamCue ${{ env.RELEASE_VERSION }}
          fail_on_unmatched_files: true
          body: |
            ## Highlights
            - Android APK release with the current DreamCue reminder, archive, rhythm, account, and Firebase sync flows.
            - Native macOS SwiftUI build with matching DreamCue visual language, shared icon assets, and account-scoped sync.
            - Firebase data remains tenant-scoped under the signed-in user ID.
            - GitHub release assets intentionally include the Android APK and macOS zip only. Play Store AAB delivery is handled separately.

            ## Verification
            - Rust workspace tests pass.
            - Android unit tests, Android UI test compilation, and release APK build pass.
            - macOS XCUITest passes, with the Firebase sync test disabled by default for deterministic CI.
            - macOS release package is signed with Developer ID and notarized when Apple signing secrets are configured.
          files: release-assets/*
