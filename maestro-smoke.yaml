appId: app.dreamcue
---
- launchApp
- assertVisible: "DreamCue"
- assertNotVisible: "Refresh"
- tapOn: "Memo"
- inputText: "alpha_note"
- tapOn: "Save"
- tapOn: "Memo"
- inputText: "beta_note"
- tapOn: "Save"
- tapOn: "Search"
- tapOn: "Search"
- inputText: "beta"
- assertNotVisible: "Waiting for manual search"
- assertNotVisible: "Search Results"
- tapOn:
    point: "84%,41%"
- assertVisible: "Search Results"
- assertVisible: "beta_note"
- tapOn: "Current"
- assertNotVisible: "In progress"
- assertNotVisible: "Added"
- tapOn: "beta_note"
- assertVisible: "Added"
- assertVisible: "Last Modified"
- assertNotVisible: "Edit"
- assertNotVisible: "Close"
- assertVisible: "Delete"
- assertVisible: "Clear"
- tapOn: "beta_note"
- inputText: "_v2"
- back
- tapOn:
    point: "8%,18%"
- tapOn: "beta_note_v2"
- tapOn: "Clear"
- tapOn: "History"
- assertVisible: "beta_note_v2"
- tapOn: "Current"
- assertVisible: "alpha_note"
- tapOn: "alpha_note"
- tapOn: "Delete"
- assertVisible: "Delete this memo?"
- tapOn: "Delete"
- assertNotVisible: "alpha_note"
